<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe App</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <h1 class="logo">Recipe App</h1>

        <nav class="nav">
          <a href="/">Home</a>
          <a href="/recipes">Recipes</a>
          <a href="/recipes/create">Create</a>
          <a href="/profile">Profile</a>
          <a href="/admin/dashboard">Admin</a>
          <a href="/auth/signin">Sign In</a>
          <a href="/auth/signup" class="nav-button">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="container hero">
      <section class="card hero-card">
        <p class="eyebrow">Recipe Sharing Platform</p>

        <h2>Discover, create, and share your favorite recipes.</h2>

        <p class="hero-text">
          A simple place to save recipes, explore ideas, and build your own
          cooking collection.
        </p>

        <div class="hero-actions">
          <a href="/recipes" class="button primary">Browse Recipes</a>
          <a href="/recipes/create" class="button secondary">Create Recipe</a>
        </div>
      </section>

      <section class="stats">
        <div class="card stat-card">
          <span class="stat-number">100</span>
          <span class="stat-label">Total Recipes</span>
        </div>

        <div class="card stat-card">
          <span class="stat-number">50</span>
          <span class="stat-label">Total Users</span>
        </div>
      </section>
    </main>
  </body>
</html>
