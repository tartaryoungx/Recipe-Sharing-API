<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Recipe</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="container header-inner">
        <h1 class="logo">Recipe App</h1>

        <nav class="nav">
          <a href="/">Home</a>
          <a href="/recipes">Recipes</a>
          <a href="/recipes/create">Create</a>
          <a href="/profile">Profile</a>
          <a href="/admin/dashboard">Admin</a>
          <a href="/auth/signin">Sign In</a>
          <a href="/auth/signup" class="nav-button">Sign Up</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <section class="card form-card">
        <p class="eyebrow">Create Recipe</p>
        <h2>Add a new recipe.</h2>

        <form class="form">
          <label>
            Recipe Title
            <input type="text" placeholder="Spicy Basil Chicken" />
          </label>

          <label>
            Description
            <textarea placeholder="Short description of your recipe"></textarea>
          </label>

          <div class="form-group">
            <label>Ingredients</label>

            <div id="ingredient-list" class="ingredient-list"></div>

            <button type="button" class="button secondary" id="open-modal">
              + Add Ingredient
            </button>
          </div>

          <label>
            Instructions
            <textarea placeholder="Step 1..."></textarea>
          </label>

          <label>
            Cooking Time
            <input type="text" placeholder="30 minutes" />
          </label>

          <button class="button primary" type="submit">Save Recipe</button>
        </form>
      </section>
    </main>

    <div class="modal" id="ingredient-modal">
      <div class="modal-content">
        <h3>Add Ingredient</h3>

        <label>
          Ingredient
          <select id="ingredient-name">
            <option>Chicken</option>
            <option>Garlic</option>
            <option>Basil</option>
            <option>Chili</option>
          </select>
        </label>

        <label>
          Quantity
          <input type="number" id="ingredient-qty" placeholder="300" />
        </label>

        <label>
          Unit
          <input type="text" id="ingredient-unit" placeholder="g" />
        </label>

        <div class="modal-actions">
          <button type="button" class="button secondary" id="close-modal">
            Cancel
          </button>

          <button type="button" class="button primary" id="save-ingredient">
            Save
          </button>
        </div>
      </div>
    </div>

    <script>
      const modal = document.getElementById("ingredient-modal");
      const openModal = document.getElementById("open-modal");
      const closeModal = document.getElementById("close-modal");
      const saveIngredient = document.getElementById("save-ingredient");
      const ingredientList = document.getElementById("ingredient-list");

      openModal.addEventListener("click", () => {
        modal.classList.add("active");
      });

      closeModal.addEventListener("click", () => {
        modal.classList.remove("active");
      });

      saveIngredient.addEventListener("click", () => {
        const name = document.getElementById("ingredient-name").value;
        const qty = document.getElementById("ingredient-qty").value;
        const unit = document.getElementById("ingredient-unit").value;

        if (!qty || !unit) {
          alert("Please fill quantity and unit");
          return;
        }

        const item = document.createElement("div");
        item.className = "ingredient-item";
        item.textContent = `${name} - ${qty} ${unit}`;

        ingredientList.appendChild(item);

        document.getElementById("ingredient-qty").value = "";
        document.getElementById("ingredient-unit").value = "";

        modal.classList.remove("active");
      });
    </script>
  </body>
</html>
